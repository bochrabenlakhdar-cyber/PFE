<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام الوطني للإحصاء الفلاحي 2025</title>
    
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Chart.js للرسوم البيانية -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0B2D1C;
            --primary: #1C4B2D;
            --primary-light: #2E6B3E;
            --secondary: #D4AF37;
            --secondary-light: #F5C542;
            --accent: #8B4513;
            --cream: #FAF7F0;
            --cream-dark: #F0E8D5;
            --text-dark: #1A2E1A;
            --text-light: #F5F1E8;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
            --success: #28a745;
            --shadow-sm: 0 5px 20px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 40px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 80px rgba(0,0,0,0.15);
            --gradient-primary: linear-gradient(135deg, #1C4B2D, #2E6B3E);
            --gradient-secondary: linear-gradient(135deg, #D4AF37, #F5C542);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #e8f0e8;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            margin: 0;
            color: var(--text-dark);
        }

        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(28, 75, 45, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(11, 45, 28, 0.03) 0%, transparent 60%);
            animation: backgroundShift 25s ease-in-out infinite;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes backgroundShift {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* ===== HEADER المتطور ===== */
        header {
            position: fixed;
            top: 20px;
            left: 5%;
            right: 5%;
            padding: 1rem 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            animation: slideDown 1s ease-out;
            transition: all 0.4s;
            width: 90%;
            margin: 0 auto;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        header:hover {
            box-shadow: var(--shadow-xl);
            border-color: var(--secondary);
        }

        .logo {
            font-family: 'Cairo', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(212,175,55,0.2), transparent);
            transform: rotate(45deg);
            animation: logoShine 3s infinite;
        }

        @keyframes logoShine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        .logo span {
            color: var(--secondary);
            position: relative;
            display: inline-block;
            animation: logoPulse 2s ease infinite;
        }

        @keyframes logoPulse {
            0%, 100% { text-shadow: 0 0 10px rgba(212,175,55,0.3); }
            50% { text-shadow: 0 0 30px rgba(212,175,55,0.6); }
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
        }

        .logo-subtitle {
            font-family: 'Cairo', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            position: relative;
            padding: 0.5rem 0;
            font-size: 1rem;
            transition: all 0.3s;
            cursor: pointer;
        }

        nav a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gradient-secondary);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s ease;
        }

        nav a:hover::before,
        nav a.active::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        nav a:hover {
            color: var(--primary);
            transform: translateY(-2px);
        }

        nav a.active {
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .notification-badge {
            position: relative;
            cursor: pointer;
        }

        .notification-badge i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px 15px;
            border-radius: 50px;
            background: rgba(28, 75, 45, 0.1);
            transition: all 0.3s;
        }

        .admin-profile:hover {
            background: rgba(212, 175, 55, 0.2);
        }

        .admin-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #1C4B2D, #2E6B3E);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--secondary);
        }

        .admin-avatar i {
            color: white;
            font-size: 20px;
        }

        .admin-info {
            display: none;
        }

        @media (min-width: 768px) {
            .admin-info {
                display: block;
            }
            
            .admin-name {
                font-weight: 700;
                color: var(--primary-dark);
                font-size: 14px;
            }
            
            .admin-role {
                font-size: 12px;
                color: var(--secondary);
            }
        }

        /* ===== الحاوية الرئيسية ===== */
        .main-container {
            max-width: 1600px;
            margin: 120px auto 30px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 25px;
        }

        /* ===== القائمة الجانبية ===== */
        .sidebar {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(28, 75, 45, 0.2);
            border-radius: 35px;
            padding: 25px 15px;
            height: fit-content;
            position: sticky;
            top: 140px;
            box-shadow: 0 20px 40px -10px rgba(28, 75, 45, 0.2);
        }

        .sidebar h2 {
            color: #1C4B2D;
            font-size: 24px;
            margin-bottom: 30px;
            padding-right: 10px;
            border-right: 4px solid #D4AF37;
            font-weight: 700;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            border-radius: 20px;
            color: #1C4B2D;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            margin-bottom: 5px;
            position: relative;
            overflow: hidden;
            opacity: 0.8;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, rgba(212, 175, 55, 0.15), transparent);
            transition: width 0.3s ease;
        }

        .menu-item:hover::before {
            width: 100%;
        }

        .menu-item i {
            width: 25px;
            color: #D4AF37;
            font-size: 18px;
            transition: all 0.3s;
        }

        .menu-item:hover {
            color: #0B2D1C;
            opacity: 1;
            transform: translateX(-5px);
        }

        .menu-item:hover i {
            transform: scale(1.2);
        }

        .menu-item.active {
            background: linear-gradient(135deg, rgba(28, 75, 45, 0.1), rgba(46, 107, 62, 0.05));
            border: 1px solid #D4AF37;
            color: #0B2D1C;
            opacity: 1;
            box-shadow: 0 10px 20px -5px rgba(28, 75, 45, 0.2);
        }

        .menu-item.active i {
            color: #D4AF37;
        }

        .menu-divider {
            height: 1px;
            background: rgba(28, 75, 45, 0.1);
            margin: 20px 15px;
        }

        /* ===== المحتوى الرئيسي ===== */
        .content {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(28, 75, 45, 0.15);
            border-radius: 35px;
            padding: 30px;
            box-shadow: 0 20px 40px -10px rgba(28, 75, 45, 0.15);
        }

        /* ===== رأس الصفحة ===== */
        .page-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .page-title h2 {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 5px;
        }

        .page-title p {
            color: var(--primary);
            opacity: 0.7;
            font-size: 14px;
        }

        /* ===== بطاقات الإحصائيات ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(28, 75, 45, 0.15);
            border-radius: 25px;
            padding: 25px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(212, 175, 55, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #D4AF37;
            box-shadow: 0 20px 30px -10px rgba(28, 75, 45, 0.25);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(28, 75, 45, 0.1), rgba(46, 107, 62, 0.1));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #D4AF37;
        }

        .stat-icon i {
            font-size: 30px;
            color: #D4AF37;
        }

        .stat-change {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
        }

        .stat-change.positive {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }

        .stat-change.negative {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
        }

        .stat-value {
            color: #0B2D1C;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #1C4B2D;
            font-size: 14px;
            opacity: 0.7;
        }

        /* ===== الرسوم البيانية ===== */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(28, 75, 45, 0.15);
            border-radius: 25px;
            padding: 20px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h3 {
            color: var(--primary-dark);
            font-size: 18px;
            font-weight: 700;
        }

        .chart-container {
            position: relative;
            height: 300px;
        }

        /* ===== قائمة الفلاحين ===== */
        .farmers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .farmer-card {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(28, 75, 45, 0.15);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
        }

        .farmer-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: 0 10px 20px -5px rgba(28, 75, 45, 0.2);
        }

        .farmer-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .farmer-avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--secondary);
        }

        .farmer-avatar i {
            font-size: 30px;
            color: white;
        }

        .farmer-info h4 {
            color: var(--primary-dark);
            font-size: 18px;
            margin-bottom: 5px;
        }

        .farmer-info p {
            color: var(--primary);
            font-size: 14px;
            opacity: 0.7;
        }

        .farmer-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .farmer-stat {
            text-align: center;
            padding: 10px;
            background: rgba(28, 75, 45, 0.05);
            border-radius: 15px;
        }

        .farmer-stat i {
            color: var(--secondary);
            font-size: 20px;
            margin-bottom: 5px;
        }

        .farmer-stat span {
            display: block;
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 16px;
        }

        .farmer-stat small {
            color: var(--primary);
            font-size: 12px;
            opacity: 0.7;
        }

        .farmer-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(28, 75, 45, 0.1);
        }

        .farmer-status {
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
        }

        .farmer-status.active {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
        }

        .farmer-status.pending {
            background: rgba(255, 193, 7, 0.1);
            color: #ffc107;
        }

        .farmer-actions {
            display: flex;
            gap: 10px;
        }

        .farmer-actions button {
            background: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .farmer-actions button:hover {
            color: var(--secondary);
        }

        /* ===== استمارة الإحصاء ===== */
        .survey-form {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(28, 75, 45, 0.15);
            border-radius: 25px;
            padding: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: var(--primary-dark);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-control {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(28, 75, 45, 0.2);
            border-radius: 15px;
            color: var(--primary-dark);
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            border: 1px solid var(--secondary);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(28, 75, 45, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--secondary);
            color: var(--primary-dark);
        }

        .btn-secondary:hover {
            background: var(--secondary);
        }

        /* ===== نافذة منبثقة للإشعارات ===== */
        .notifications-panel {
            position: fixed;
            top: 100px;
            left: 5%;
            width: 350px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid var(--secondary);
            border-radius: 30px;
            padding: 20px;
            box-shadow: var(--shadow-xl);
            z-index: 1000;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .notifications-panel.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .notifications-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .notifications-header h3 {
            color: var(--primary-dark);
        }

        .notification-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            border-bottom: 1px solid rgba(28, 75, 45, 0.1);
            transition: all 0.3s;
        }

        .notification-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        .notification-item.unread {
            background: rgba(212, 175, 55, 0.05);
        }

        .notification-dot {
            width: 8px;
            height: 8px;
            background: var(--secondary);
            border-radius: 50%;
            margin-top: 5px;
        }

        .notification-content p {
            color: var(--primary-dark);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .notification-time {
            color: var(--primary);
            font-size: 12px;
            opacity: 0.7;
        }

        /* ===== استجابة للشاشات الصغيرة ===== */
        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1000px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                position: static;
                margin-bottom: 20px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                border-radius: 30px;
                padding: 1rem;
            }
            
            nav ul {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header متطور -->
    <header>
        <a class="logo" href="#" onclick="showPage('dashboard')">
            <div class="logo-wrap">
                <div>green<span>ish</span></div>
                <div class="logo-subtitle">النظام الوطني للإحصاء</div>
            </div>
        </a>
        <nav>
            <ul>
                <li><a class="active" onclick="showPage('dashboard')">لوحة التحكم</a></li>
                <li><a onclick="showPage('survey')">الإحصاء الفلاحي</a></li>
                <li><a onclick="showPage('farmers')">قائمة الفلاحين</a></li>
                <li><a onclick="showPage('reports')">التقارير</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <div class="notification-badge" onclick="toggleNotifications()">
                <i class="fas fa-bell"></i>
                <span class="badge" id="notificationCount">0</span>
            </div>
            <div class="admin-profile">
                <div class="admin-avatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div class="admin-info">
                    <div class="admin-name">مدير النظام</div>
                    <div class="admin-role">الإدارة المركزية</div>
                </div>
            </div>
        </div>

        // ===== تحديث جميع الإحصائيات =====
        function updateAllStats() {
            // تحديث أعداد الفلاحين
            document.querySelectorAll('#sidebarFarmerCount, #farmerCount, #dashboardFarmerCount').forEach(el => {
                if (el) el.textContent = farmers.length;
            });

            // حساب الإحصائيات
            let totalArea = farmers.reduce((sum, f) => sum + (parseFloat(f.area) || 0), 0);
            let totalBovins = farmers.reduce((sum, f) => sum + (parseInt(f.bovins) || 0), 0);
            let totalOvins = farmers.reduce((sum, f) => sum + (parseInt(f.ovins) || 0), 0);
            let totalCaprins = farmers.reduce((sum, f) => sum + (parseInt(f.caprins) || 0), 0);
            let totalAnimals = totalBovins + totalOvins + totalCaprins;
            
            let totalPoulets = farmers.reduce((sum, f) => sum + (parseInt(f.pouletsChair) || 0) + (parseInt(f.pouletsPondeuses) || 0), 0);
            let totalRuches = farmers.reduce((sum, f) => sum + (parseInt(f.ruchesModernes) || 0) + (parseInt(f.ruchesTraditionnelles) || 0), 0);
            
            let totalSuperficieSeche = farmers.reduce((sum, f) => sum + (parseFloat(f.superficieSeche) || 0), 0);
            let totalSuperficieIrriguee = farmers.reduce((sum, f) => sum + (parseFloat(f.superficieIrriguee) || 0), 0);

            // تحديث العناصر في الصفحة
            document.querySelectorAll('#totalArea').forEach(el => {
                if (el) el.textContent = totalArea.toFixed(1);
            });
            
            document.querySelectorAll('#totalAnimals').forEach(el => {
                if (el) el.textContent = totalAnimals;
            });
            
            document.querySelectorAll('#totalBovins').forEach(el => {
                if (el) el.textContent = totalBovins;
            });
            
            document.querySelectorAll('#totalOvins').forEach(el => {
                if (el) el.textContent = totalOvins;
            });
            
            document.querySelectorAll('#totalCaprins').forEach(el => {
                if (el) el.textContent = totalCaprins;
            });
            
            document.querySelectorAll('#totalPoulets').forEach(el => {
                if (el) el.textContent = totalPoulets;
            });
            
            document.querySelectorAll('#totalRuches').forEach(el => {
                if (el) el.textContent = totalRuches;
            });
            
            document.querySelectorAll('#totalSuperficieSeche').forEach(el => {
                if (el) el.textContent = totalSuperficieSeche.toFixed(1);
            });
            
            document.querySelectorAll('#totalSuperficieIrriguee').forEach(el => {
                if (el) el.textContent = totalSuperficieIrriguee.toFixed(1);
            });

            // حساب النسب المئوية
            let activeFarmers = farmers.filter(f => f.status === 'active').length;
            let pendingFarmers = farmers.filter(f => f.status === 'pending').length;
            
            document.querySelectorAll('#activePercentage').forEach(el => {
                if (el) el.textContent = farmers.length ? Math.round((activeFarmers / farmers.length) * 100) : 0;
            });
            
            document.querySelectorAll('#pendingCount').forEach(el => {
                if (el) el.textContent = pendingFarmers;
            });

            // تحديث الرسم البياني إذا كان موجوداً
            updateCharts();
        }

        // ===== تحديث الرسوم البيانية =====
        function updateCharts() {
            if (typeof Chart === 'undefined') return;

            // بيانات التسجيلات الشهرية
            const monthlyData = [0, 0, 0, 0, 0, 0];
            farmers.forEach(f => {
                let month = new Date(f.date).getMonth();
                if (month >= 0 && month < 6) monthlyData[month]++;
            });

            // تحديث الرسم البياني للتسجيلات
            const registrationsCtx = document.getElementById('registrationsChart')?.getContext('2d');
            if (registrationsCtx) {
                if (window.registrationsChart) window.registrationsChart.destroy();
                window.registrationsChart = new Chart(registrationsCtx, {
                    type: 'line',
                    data: {
                        labels: ['جانفي', 'فيفري', 'مارس', 'أفريل', 'ماي', 'جوان'],
                        datasets: [{
                            label: 'عدد التسجيلات',
                            data: monthlyData,
                            borderColor: '#1C4B2D',
                            backgroundColor: 'rgba(28, 75, 45, 0.1)',
                            borderWidth: 3,
                            pointBackgroundColor: '#D4AF37',
                            pointBorderColor: '#1C4B2D',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });
            }

            // بيانات المحاصيل
            const cropsData = [0, 0, 0, 0];
            farmers.forEach(f => {
                if (f.grandesCultures) cropsData[0] += parseFloat(f.grandesCultures) || 0;
                if (f.legumes) cropsData[1] += parseFloat(f.legumes) || 0;
                if (f.arbresFruitiers) cropsData[2] += parseFloat(f.arbresFruitiers) || 0;
            });
            
            // إذا لا توجد بيانات، استخدم بيانات افتراضية
            if (cropsData.every(v => v === 0)) {
                cropsData[0] = 45;
                cropsData[1] = 25;
                cropsData[2] = 20;
                cropsData[3] = 10;
            }

            const cropsCtx = document.getElementById('cropsChart')?.getContext('2d');
            if (cropsCtx) {
                if (window.cropsChart) window.cropsChart.destroy();
                window.cropsChart = new Chart(cropsCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['حبوب', 'خضروات', 'أشجار مثمرة', 'أعلاف'],
                        datasets: [{
                            data: cropsData,
                            backgroundColor: ['#1C4B2D', '#2E6B3E', '#D4AF37', '#8B4513'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: { color: '#1C4B2D', font: { family: 'Cairo' } }
                            }
                        },
                        cutout: '70%'
                    }
                });
            }
        }

        // ===== إنشاء إشعار جديد =====
        function addNotification(message, type = 'info') {
            let notification = {
                id: Date.now(),
                message: message,
                time: new Date(),
                read: false
            };
            notifications.unshift(notification);
            if (notifications.length > 10) notifications.pop();
            
            updateNotifications();
        }

        // ===== تحديث لوحة الإشعارات =====
        function updateNotifications() {
            let list = document.getElementById('notificationsList');
            let count = document.getElementById('notificationCount');
            
            if (list) {
                if (notifications.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: var(--primary); padding: 20px;">لا توجد إشعارات جديدة</p>';
                } else {
                    list.innerHTML = notifications.map(n => `
                        <div class="notification-item ${n.read ? '' : 'unread'}">
                            <div class="notification-dot"></div>
                            <div class="notification-content">
                                <p>${n.message}</p>
                                <div class="notification-time">${getTimeAgo(n.time)}</div>
                            </div>
                        </div>
                    `).join('');
                }
            }
            
            if (count) {
                let unread = notifications.filter(n => !n.read).length;
                count.textContent = unread;
                count.style.display = unread > 0 ? 'flex' : 'none';
            }
        }

        // ===== حساب الوقت المنقضي =====
        function getTimeAgo(date) {
            let seconds = Math.floor((new Date() - new Date(date)) / 1000);
            let intervals = [
                { label: 'سنة', seconds: 31536000 },
                { label: 'شهر', seconds: 2592000 },
                { label: 'أسبوع', seconds: 604800 },
                { label: 'يوم', seconds: 86400 },
                { label: 'ساعة', seconds: 3600 },
                { label: 'دقيقة', seconds: 60 }
            ];
            
            for (let interval of intervals) {
                let count = Math.floor(seconds / interval.seconds);
                if (count > 0) {
                    return `منذ ${count} ${interval.label}${count > 2 ? 'ات' : count > 1 ? 'ين' : ''}`;
                }
            }
            return 'منذ لحظات';
        }

                            <i class="fas fa-tractor"></i>
                            <span>${f.area || 0}</span>

                        </div>

                    <div class="farmer-footer">

        // ===== حفظ فلاح جديد =====
        function saveFarmer() {
            let name = document.getElementById('farmerName')?.value;
            if (!name) {
                alert('الرجاء إدخال اسم الفلاح');
                return;
            }
            
            let farmer = {
                id: Date.now(),
                name: name,
                phone: document.getElementById('farmerPhone')?.value || '',
                wilaya: document.getElementById('farmerWilaya')?.value || '',
                area: parseFloat(document.getElementById('farmerArea')?.value) || 0,
                birthYear: parseInt(document.getElementById('farmerBirthYear')?.value) || 1980,
                sexe: document.querySelector('input[name="farmerSexe"]:checked')?.value || 'male',
                bovins: parseInt(document.getElementById('farmerBovins')?.value) || 0,
                ovins: parseInt(document.getElementById('farmerOvins')?.value) || 0,
                caprins: parseInt(document.getElementById('farmerCaprins')?.value) || 0,
                date: new Date().toISOString(),
                status: 'pending'
            };
            
            farmers.push(farmer);
            localStorage.setItem('farmers', JSON.stringify(farmers));
            
            addNotification(`تم تسجيل فلاح جديد: ${name}`);
            updateAllStats();
            
            // العودة إلى لوحة التحكم
            showPage('dashboard');
        }

        // ===== التنقل بين الصفحات =====
        function showPage(page) {
            // تحديث القائمة النشطة
            document.querySelectorAll('nav a, .menu-item').forEach(el => {
                el.classList.remove('active');
            });
            
            document.querySelectorAll(`[onclick="showPage('${page}')"]`).forEach(el => {
                el.classList.add('active');
            });

            // تحميل المحتوى المناسب
            let content = document.getElementById('mainContent');
            
            switch(page) {
                case 'dashboard':
                    content.innerHTML = getDashboardHTML();
                    setTimeout(() => {
                        updateAllStats();
                        updateCharts();
                    }, 100);
                    break;
                case 'survey':
                    content.innerHTML = getSurveyHTML();
                    break;
                case 'farmers':
                    content.innerHTML = getFarmersHTML();
                    setTimeout(renderFarmersList, 100);
                    break;
                case 'reports':
                    content.innerHTML = getReportsHTML();
                    setTimeout(() => {
                        updateAllStats();
                        updateCharts();
                    }, 100);
                    break;
                case 'statistics':
                    content.innerHTML = getStatisticsHTML();
                    setTimeout(updateAllStats, 100);
                    break;
                case 'maps':
                    content.innerHTML = getMapsHTML();
                    break;
            }
        }

                                    <option value="">اختر الولاية</option>
                                    <option value="16">الجزائر</option>
                                    <option value="31">وهران</option>
                                    <option value="25">قسنطينة</option>
                                    <option value="23">عنابة</option>
                                    <option value="19">سطيف</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>المساحة (هكتار)</label>
                                <input type="number" step="0.1" class="form-control" id="farmerArea" placeholder="مثال: 15.5">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>سنة الميلاد</label>
                                <input type="number" class="form-control" id="farmerBirthYear" placeholder="1990" min="1900" max="2025">
                            </div>
                            <div class="form-group">
                                <label>الجنس</label>
                                <div style="display: flex; gap: 20px; padding: 10px 0;">
                                    <label><input type="radio" name="farmerSexe" value="male" checked> ذكر</label>
                                    <label><input type="radio" name="farmerSexe" value="female"> أنثى</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>عدد الأبقار</label>
                                <input type="number" class="form-control" id="farmerBovins" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>عدد الأغنام</label>
                                <input type="number" class="form-control" id="farmerOvins" value="0" min="0">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>عدد الماعز</label>
                                <input type="number" class="form-control" id="farmerCaprins" value="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>عدد الدواجن</label>
                                <input type="number" class="form-control" id="farmerPoulets" value="0" min="0">
                            </div>
                        </div>

                        <div style="display: flex; gap: 15px; margin-top: 30px;">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> حفظ الفلاح
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="showPage('dashboard')">
                                <i class="fas fa-times"></i> إلغاء
                            </button>
                        </div>
                    </form>
                </div>
            `;
        }

        function getFarmersHTML() {
            return `
                <div class="page-header">
                    <div class="page-title">
                        <h2>قائمة الفلاحين</h2>
                        <p>عرض جميع الفلاحين المسجلين في النظام</p>
                    </div>
                    <button class="btn btn-primary" onclick="showPage('survey')">
                        <i class="fas fa-plus"></i> إضافة فلاح جديد
                    </button>
                </div>

                <div id="farmersList" class="farmers-grid"></div>
            `;
        }

        function getReportsHTML() {
            let totalArea = farmers.reduce((sum, f) => sum + (parseFloat(f.area) || 0), 0);
            let totalBovins = farmers.reduce((sum, f) => sum + (parseInt(f.bovins) || 0), 0);
            let totalOvins = farmers.reduce((sum, f) => sum + (parseInt(f.ovins) || 0), 0);
            let totalCaprins = farmers.reduce((sum, f) => sum + (parseInt(f.caprins) || 0), 0);

            return `
                <div class="page-header">
                    <div class="page-title">
                        <h2>التقارير الإحصائية</h2>
                        <p>تقارير مفصلة عن النشاط الفلاحي</p>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                        </div>
                        <div class="stat-value">${new Date().toLocaleDateString('ar-DZ')}</div>
                        <div class="stat-label">تاريخ التقرير</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon"><i class="fas fa-chart-pie"></i></div>
                        </div>
                        <div class="stat-value">${farmers.length}</div>
                        <div class="stat-label">إجمالي الفلاحين</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon"><i class="fas fa-tractor"></i></div>
                        </div>
                        <div class="stat-value">${totalArea.toFixed(1)}</div>
                        <div class="stat-label">المساحة (هكتار)</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon"><i class="fas fa-paw"></i></div>
                        </div>
                        <div class="stat-value">${totalBovins + totalOvins + totalCaprins}</div>
                        <div class="stat-label">إجمالي المواشي</div>
                    </div>
                </div>

                <div style="background: rgba(255,255,255,0.8); border-radius: 25px; padding: 30px; margin-top: 20px;">
                    <h3 style="color: var(--primary-dark); margin-bottom: 20px;">تفاصيل الثروة الحيوانية</h3>
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                        <div style="text-align: center; padding: 20px; background: rgba(28,75,45,0.05); border-radius: 20px;">
                            <i class="fas fa-cow" style="font-size: 40px; color: var(--secondary); margin-bottom: 10px;"></i>
                            <h4 style="color: var(--primary-dark);">الأبقار</h4>
                            <p style="font-size: 24px; font-weight: 800; color: var(--primary);">${totalBovins}</p>
                        </div>
                        <div style="text-align: center; padding: 20px; background: rgba(28,75,45,0.05); border-radius: 20px;">
                            <i class="fas fa-sheep" style="font-size: 40px; color: var(--secondary); margin-bottom: 10px;"></i>
                            <h4 style="color: var(--primary-dark);">الأغنام</h4>
                            <p style="font-size: 24px; font-weight: 800; color: var(--primary);">${totalOvins}</p>
                        </div>
                        <div style="text-align: center; padding: 20px; background: rgba(28,75,45,0.05); border-radius: 20px;">
                            <i class="fas fa-goat" style="font-size: 40px; color: var(--secondary); margin-bottom: 10px;"></i>
                            <h4 style="color: var(--primary-dark);">الماعز</h4>
                            <p style="font-size: 24px; font-weight: 800; color: var(--primary);">${totalCaprins}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function getStatisticsHTML() {
            return `
                <div class="page-header">
                    <div class="page-title">
                        <h2>الإحصائيات التفصيلية</h2>
                        <p>تحليل متقدم للبيانات الفلاحية</p>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon"><i class="fas fa-water"></i></div>
                        </div>
                        <div class="stat-value" id="totalSuperficieIrriguee">0</div>
                        <div class="stat-label">المساحات المسقية</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon"><i class="fas fa-drumstick-bite"></i></div>
                        </div>
                        <div class="stat-value" id="totalPoulets">0</div>
                        <div class="stat-label">الدواجن</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon"><i class="fas fa-bug"></i></div>
                        </div>
                        <div class="stat-value" id="totalRuches">0</div>
                        <div class="stat-label">خلايا النحل</div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon"><i class="fas fa-clock"></i></div>
                        </div>
                        <div class="stat-value" id="pendingCount">0</div>
                        <div class="stat-label">قيد الانتظار</div>
                    </div>
                </div>
            `;
        }

        function getMapsHTML() {
            return `
                <div class="page-header">
                    <div class="page-title">
                        <h2>الخريطة التفاعلية</h2>
                        <p>توزيع المستثمرات الفلاحية على الخريطة</p>
                    </div>
                </div>

                <div style="background: rgba(255,255,255,0.8); border-radius: 25px; padding: 50px; text-align: center;">
                    <i class="fas fa-map-marked-alt" style="font-size: 80px; color: var(--secondary); margin-bottom: 20px;"></i>
                    <h3 style="color: var(--primary-dark); margin-bottom: 10px;">الخريطة التفاعلية قريباً</h3>
                    <p style="color: var(--primary);">سيتم إضافة الخريطة التفاعلية في التحديث القادم</p>
                </div>
            `;
        }

        // ===== دوال مساعدة =====
        function toggleNotifications() {
            document.getElementById('notificationsPanel').classList.toggle('active');
        }

        // تهيئة الصفحة
        window.onload = function() {
            // إضافة بعض الإشعارات التجريبية
            addNotification('تم تحديث النظام إلى الإصدار 2.5.0');
            addNotification('اكتمال 80% من الإحصاء الوطني');
            
            if (farmers.length > 0) {
                addNotification(`تم تسجيل ${farmers.length} فلاح حتى الآن`);
            }
            
            updateAllStats();
            showPage('dashboard');
        };

        // إغلاق الإشعارات عند النقر خارجها
        document.addEventListener('click', function(event) {
            let panel = document.getElementById('notificationsPanel');
            let bell = document.querySelector('.notification-badge');
            
            if (panel && bell && !panel.contains(event.target) && !bell.contains(event.target)) {
                panel.classList.remove('active');
            }
        });
    </script>
</body>
</html>
